<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KGFEGLTS7J"></script>
<script>
  async function submitDemo() {
    const btn = document.getElementById("submit-btn");
    const status = document.getElementById("form-status");
    const name = document.getElementById("f-name").value.trim();
    const email = document.getElementById("f-email").value.trim();
    if (!name || !email) { status.style.color="#E24B4A"; status.textContent="Please fill in your name and email."; return; }
    btn.disabled = true; btn.textContent = "Sending...";
    status.textContent = "";
    try {
      const res = await fetch("/.netlify/functions/demo-request", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email,
          company: document.getElementById("f-company").value.trim(),
          operatorType: document.getElementById("f-type").value,
          fleetSize: document.getElementById("f-fleet").value.trim(),
          message: document.getElementById("f-message").value.trim() }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        status.style.color="#1D9E75"; status.textContent="Request received - we will be in touch within one business day.";
        btn.textContent="Sent";
        document.getElementById("demo-form").querySelectorAll("input,select,textarea").forEach(el=>el.value="");
      } else { throw new Error(data.error); }
    } catch(err) {
      status.style.color="#E24B4A"; status.textContent="Something went wrong. Email us at alex@encounterengineering.org";
      btn.disabled=false; btn.textContent="Request Demo";
    }
  }
  function toggleTheme() {
    document.body.classList.toggle("light-mode");
    const btn = document.getElementById("theme-toggle");
    btn.textContent = document.body.classList.contains("light-mode") ? "dark" : "light";
    localStorage.setItem("careride-theme", document.body.classList.contains("light-mode") ? "light" : "dark");
  }
  if (localStorage.getItem("careride-theme") === "light") {
    document.body.classList.add("light-mode");
    document.getElementById("theme-toggle").textContent = "dark";
  }
</script>
</body>
</html>
